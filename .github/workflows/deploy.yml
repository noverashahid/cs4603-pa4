# Bonus A — CI/CD pipeline (.github/workflows/deploy.yml)
#
# TODO: Implement a lint -> test -> deploy workflow.
#   - lint:   ruff check on agent/ and client/
#   - test:   a smoke test that imports and compiles the graph
#   - deploy: ONLY on push to main; log the model, register a new UC version,
#             and update the serving endpoint. Use GitHub Secrets for
#             DATABRICKS_HOST / DATABRICKS_TOKEN. Add a workflow_dispatch trigger.

name: deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # TODO: install uv, sync deps, run `ruff check` and the smoke test
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Lint with ruff
        run: uvx ruff check agent/ client/

      - name: Run offline smoke test
        env:
          # Use dummy strings here so the offline test doesn't consume your real Databricks quota!
          DATABRICKS_HOST: "https://dummy.cloud.databricks.com"
          DATABRICKS_TOKEN: "dummy-token-for-ci"
          DATABRICKS_MODEL: "databricks-meta-llama-3-3-70b-instruct"
          EMBEDDINGS_ENDPOINT: "databricks-gte-large-en"
          UC_CATALOG: "main"
          UC_SCHEMA: "default"
          VECTOR_SEARCH_ENDPOINT: "dummy-endpoint"
          VECTOR_SEARCH_INDEX: "main.default.dummy_index"
        run: uv run pytest -q tests/test_smoke.py

  deploy:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # TODO: install deps and run `python deployment/deploy.py` with secrets
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Deploy model
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_MODEL: ${{ secrets.DATABRICKS_MODEL }}
          EMBEDDINGS_ENDPOINT: ${{ secrets.EMBEDDINGS_ENDPOINT }}
          UC_CATALOG: ${{ secrets.UC_CATALOG }}
          UC_SCHEMA: ${{ secrets.UC_SCHEMA }}
          VECTOR_SEARCH_ENDPOINT: ${{ secrets.VECTOR_SEARCH_ENDPOINT }}
          VECTOR_SEARCH_INDEX: ${{ secrets.VECTOR_SEARCH_INDEX }}
          SERVING_ENDPOINT_NAME: ${{ secrets.SERVING_ENDPOINT_NAME }}
          SECRET_SCOPE: ${{ secrets.SECRET_SCOPE }}
          SOURCE_TABLE: ${{ secrets.SOURCE_TABLE }}
        run: uv run python deployment/deploy.py

      - name: Print deployment status
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          SERVING_ENDPOINT_NAME: ${{ secrets.SERVING_ENDPOINT_NAME }}
        run: |
          uv run python -c "
          import os
          from databricks.sdk import WorkspaceClient
          w = WorkspaceClient()
          name = os.environ.get('SERVING_ENDPOINT_NAME', 'pa4-document-analyst')
          ep = w.serving_endpoints.get(name)
          print(f'Endpoint: {ep.name}')
          print(f'Ready state: {ep.state.ready if ep.state else \"UNKNOWN\"}')
          served = ep.pending_config.served_entities[0] if ep.pending_config else ep.config.served_entities[0]
          print(f'Model version deployed: {served.entity_version}')
          "
